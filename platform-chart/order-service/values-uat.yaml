app:
  replicas: 2
  tag: latest
  team: payments-team

config:
  logLevel: INFO
  appEnv: uat
  mqHost: mq-uat.internal
  kafkaBootstrapServers: kafka-uat:9092
  mainframeHost: mainframe-uat.internal

vault:
  useESO: false
  deploy: false
  host: vault
  port: 8200
  path: order-service/uat
  mountPath: myapp/secret
  token: myroot                  # uat token
  refreshInterval: 1h

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  cpuThreshold: 70

resources:
  requests:
    memory: 512Mi
    cpu: 200m
  limits:
    memory: 1Gi
    cpu: 1000m
