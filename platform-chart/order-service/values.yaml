app:
  name: order-service
  image: image-registry.openshift-image-registry.svc:5000/gvsuneelkumar1981-dev/order-service
  tag: latest
  port: 8080
  replicas: 1
  team: payments-team
  costCenter: CC-1234
  terminationGracePeriod: 60

config:
  logLevel: INFO
  appEnv: dev
  mqHost: mq.internal
  kafkaBootstrapServers: kafka:9092
  mainframeHost: mainframe.internal
  sftpHost: sftp.internal

# Vault config
vault:
  useESO: false              # ESO disabled, using Spring Cloud Vault
  deploy: false              # Vault not deployed by chart
  host: vault
  port: 8200
  path: order-service/dev
  mountPath: myapp/secret
  token: myroot              # dev token
  refreshInterval: 1h

# HPA disabled by default
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

health:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  initialDelaySeconds: 60
  periodSeconds: 10