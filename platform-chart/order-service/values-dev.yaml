app:
  replicas: 1
  tag: latest
  team: payments-team
config:
  logLevel: DEBUG
  appEnv: dev
  mqHost: mq-dev.internal
  kafkaBootstrapServers: kafka-dev:9092
  mainframeHost: mainframe-dev.internal

vault:
  useESO: false
  deploy: false
  host: vault                    # vault service name in OCP
  port: 8200
  path: order-service/dev
  mountPath: myapp/secret
  token: myroot                  # dev token
  refreshInterval: 1h

hpa:
  enabled: false
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m