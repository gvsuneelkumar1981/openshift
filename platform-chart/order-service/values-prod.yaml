app:
  replicas: 3
  tag: latest
  team: payments-team

config:
  logLevel: WARN
  appEnv: prod
  mqHost: mq-prod.internal
  kafkaBootstrapServers: kafka-prod-cluster:9092
  mainframeHost: mainframe-prod.internal

vault:
  useESO: false
  deploy: false
  host: vault
  port: 8200
  path: order-service/prod
  mountPath: myapp/secret
  token: ${VAULT_PROD_TOKEN}     # injected by pipeline
  refreshInterval: 30m

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  cpuThreshold: 60

resources:
  requests:
    memory: 512Mi
    cpu: 500m
  limits:
    memory: 1Gi
    cpu: 2000m