spring:
  application:
    name: order-service
  config:
    import: vault://

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

#datasource:
#  url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:orderdb}
#  username: ${DB_USERNAME:orderuser}
#  password: ${db_password}

# These come from Vault automatically
# Spring Cloud Vault injects them as properties
app:
  environment: ${APP_ENV:local}
  mainframe:
    host: ${MAINFRAME_HOST:localhost}

logging:
  level:
    root: ${LOG_LEVEL:DEBUG}
    org.springframework.boot.context.config: TRACE
    org.springframework.cloud.vault: TRACE
    org.springframework.vault: TRACE
  pattern:
    console: '{"timestamp":"%d","level":"%-5p","service":"${spring.application.name}","message":"%m"}%n'