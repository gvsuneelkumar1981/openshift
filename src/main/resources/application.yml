spring:
  application:
    name: order-service

  cloud:
    vault:
      enabled: true
      uri: http://vault:8200
      authentication: TOKEN
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: myapp/secret
        application-name: order-service
#      generic:
#        enabled: false
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

# Read from env vars injected by OCP
app:
  environment: ${APP_ENV:local}
  mainframe:
    host: ${MAINFRAME_HOST:localhost}

logging:
  level:
    root: ${LOG_LEVEL:INFO}