spring:
  application:
    name: order-service
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

# Read from env vars injected by OCP
app:
  environment: ${APP_ENV:local}
  mainframe:
    host: ${MAINFRAME_HOST:localhost}

logging:
  level:
    root: ${LOG_LEVEL:INFO}